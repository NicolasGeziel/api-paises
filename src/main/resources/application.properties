spring.application.name=paises-api

# Conexão com o banco H2 em memória
spring.datasource.url=jdbc:h2:mem:paisdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar o console do H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate cria/atualiza as tabelas automaticamente com base nas Entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Resolve conflitos de path do Swagger
springdoc.swagger-ui.path=/swagger-ui.html
